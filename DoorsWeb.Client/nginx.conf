events {}
http {
    # Security hardening: Don't reveal the Nginx version in responses.
    server_tokens off;

    # The API container. We talk to it over its internal HTTPS port (8081) so the API's
    # UseHttpsRedirection() doesn't 307 us; proxy_ssl_verify is off below because this hop
    # stays on the private Docker network and the internal cert isn't browser-facing.
    upstream doorsweb_api {
        server doorsweb.api:8081;
    }

    # WebSocket upgrade plumbing for SignalR: "upgrade" for a real handshake, "close" otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Optional: Cache-Control policy by URI.
    # - index.html and service-worker.js: avoid caching so app updates are picked up.
    # - /_framework/*: fingerprinted assets can be cached long-term.
    map $uri $cache_control {
        default             "max-age=3600";
        /index.html         "no-cache";
        /service-worker.js  "no-cache";

        # IMPORTANT: .NET 8/9 Blazor WASM apps do not fingerprint these files
        # Uncomment if the Blazor WASM app targets .NET 8/9, remove for .NET 10
        # /_framework/blazor.boot.json        "no-cache";
        # /_framework/blazor.webassembly.js   "max-age=3600";
        # /_framework/dotnet.js               "max-age=3600";

        ~^/_framework/      "public, max-age=31536000, immutable";
        ~\.woff2?$          "public, max-age=31536000, immutable";
    }

    # MIME types for Blazor WebAssembly assets.
    types {
        text/html                           html htm;
        text/css                            css;
        application/javascript              js mjs;
        application/json                    json;
        application/manifest+json           webmanifest;
        application/wasm                    wasm;
        text/plain                          txt;
        text/xml                            xml;
        application/octet-stream            bin dll exe pdb blat dat webcil;

        # Images
        image/png                           png;
        image/jpeg                          jpg jpeg;
        image/gif                           gif;
        image/webp                          webp;
        image/avif                          avif;
        image/svg+xml                       svg;
        image/x-icon                        ico;

        # Fonts
        font/woff                           woff;
        font/woff2                          woff2;

        # Fallback for other MIME types
        application/octet-stream            *;
    }

    server {
        listen 443 ssl;
        server_name _;

        # Mounted at runtime from the host (see docker-compose.override.yml). Generated by
        # mkcert so it's signed by a locally-trusted CA — no self-signed browser warning.
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Shared proxy settings (inherited by every proxy_pass location below). The upgrade
        # headers are harmless for plain HTTP requests and enable WebSockets for the hubs.
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_ssl_verify   off;
        proxy_read_timeout 3600s;

        # --- Reverse-proxy the API so the browser only ever sees this one origin ---
        # REST controllers (api/[controller]) and the auth endpoints (route "auth").
        location /api/  { proxy_pass https://doorsweb_api; }
        location /auth/ { proxy_pass https://doorsweb_api; }
        # Uploaded photos / floorplan images served as static files by the API.
        location /media/ { proxy_pass https://doorsweb_api; }
        # SignalR hubs (live door state / events / backup progress) — need the WebSocket upgrade.
        location /eventHub  { proxy_pass https://doorsweb_api; }
        location /backupHub { proxy_pass https://doorsweb_api; }

        # Blazor framework assets are fingerprinted and must exist on disk. Serve them directly and
        # return a real 404 if one is missing — do NOT fall through to the index.html SPA fallback
        # below, which would hand back text/html for a missing .js/.wasm and surface as a confusing
        # "disallowed MIME type" module error instead of an honest 404.
        location /_framework/ {
            root      /usr/share/nginx/html;
            try_files $uri =404;
            gzip_static on;
            add_header Cache-Control $cache_control always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            # Root path for static site content.
            root      /usr/share/nginx/html;

            # SPA/Blazor routing:
            # - Serve a file if it exists.
            # - Otherwise fall back to index.html.
            try_files $uri $uri/ /index.html =404;

            # Optional: Serve precompressed *.gz files (when present) instead of 
            # compressing on the fly.
            gzip_static on;

            # Optional: Caching policy based on "map $uri $cache_control" above.
            add_header Cache-Control $cache_control always;

            # Optional: Mitigate MIME sniffing.
            add_header X-Content-Type-Options "nosniff" always;
            }
        }
}