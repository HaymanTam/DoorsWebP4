<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Progeny P4 Doors Web</title>
    <!-- <base> MUST come before the import map: an import map resolves its (relative) keys against
         the document base URL at parse time, so if <base href="/"> appears after it, deep-link URLs
         like /doors/1 make "./_framework/dotnet.js" resolve to "/doors/_framework/..." — the remap
         to the fingerprinted file misses, the literal dotnet.js 404s, and nginx returns index.html
         (text/html) -> "disallowed MIME type" on a fresh load of any sub-route. -->
    <base href="/" />
    <script type="importmap"></script>

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" type="image/png" href="favicon.png" />

    <link rel="stylesheet" href="https://unpkg.com/@tabler/core@1.4.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="_content/TabBlazor/css/tabblazor.min.css" />
    <script src="_content/TabBlazor/js/tabblazor.js"></script>


    <link href="css/site.css" rel="stylesheet" />
    <link href="DoorsWeb.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div id="wasm-loadpage">
            <div id="spinner"></div>
            <h3><span class="wasm-kicker">Progeny</span>Loading Doors Web</h3>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" asp-append-version="true"></script>
</body>

</html>
