services:
  doorsweb.client:
    image: ${DOCKER_REGISTRY-}doorswebclient
    build:
      context: .
      dockerfile: DoorsWeb.Client/Dockerfile
    container_name: doorsweb.client
    ports:
      - "60880:443"
    volumes:
      - user-photo:/media/user-photo
    depends_on: 
      - doorsweb.api
    networks:
      - doorsweb

  doorsweb.api:
    image: ${DOCKER_REGISTRY-}doorswebapi
    build:
      context: .
      dockerfile: DoorsWeb.API/Dockerfile
    container_name: doorsweb.api
    ports:
      - "60878:8080"
      - "60879:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doorsweb

  postgres:
    image: postgres:17
    container_name: doorsweb.postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doorsweb

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: doorsweb.mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped
    networks:
      - doorsweb

networks:
  doorsweb:
    driver: bridge

volumes:
  user-photo:
    driver: local
  postgres-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local