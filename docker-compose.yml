services:
  doorsweb.client:
    image: ${DOCKER_REGISTRY-}doorswebclient
    build:
      context: .
      dockerfile: DoorsWeb.Client/Dockerfile
    container_name: doorsweb.client
    # Static-file/Blazor host; keeps a small footprint.
    mem_limit: 512m
    ports:
      - "60880:443"
    depends_on:
      - doorsweb.api
    networks:
      - doorsweb

  doorsweb.api:
    image: ${DOCKER_REGISTRY-}doorswebapi
    build:
      context: .
      dockerfile: DoorsWeb.API/Dockerfile
    container_name: doorsweb.api
    # .NET API; 1 GB is plenty for dev workloads (raise if large legacy restores OOM).
    mem_limit: 1g
    ports:
      - "60878:8080"
      - "60879:8081"
      # UDP protocol listener (UdpProtocol:ListenPort). Controllers reach the
      # API on this port; outbound packets to controllers use 10012 and NAT out.
      - "10013:10013/udp"
    environment:
      # Container-internal storage paths (constant). The host side is chosen below.
      - Backup__Directory=/data/backups
      - Storage__UserPhotoDirectory=/data/user-photo
      - Storage__SettingsDirectory=/data/settings
    volumes:
      # Hybrid storage: a Docker-managed named volume is used by default.
      # Set BACKUP_PATH / USER_PHOTO_PATH in .env to a host folder to bind-mount
      # a real directory instead (e.g. /srv/doorsweb/backups or D:/DoorsData).
      - ${BACKUP_PATH:-backups}:/data/backups
      - ${USER_PHOTO_PATH:-user-photo}:/data/user-photo
      - ${SETTINGS_PATH:-settings}:/data/settings
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - doorsweb

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: doorsweb.mssql
    # SQL Server grows its buffer pool to consume ALL available RAM by default and
    # never releases it (looks like a leak, but is by design). MSSQL_MEMORY_LIMIT_MB
    # caps SQL Server's own "max server memory"; mem_limit is the hard container
    # ceiling and is kept ~1 GB above the buffer-pool cap to leave headroom for
    # SQL's non-buffer-pool memory (avoids Docker OOM-killing the container).
    mem_limit: 2560m
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_MEMORY_LIMIT_MB=1536
    ports:
      # Host port is overridable via MSSQL_HOST_PORT in .env (defaults to 1433).
      # The container port stays 1433, so in-network clients still use doorsweb.mssql:1433.
      - "${MSSQL_HOST_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - doorsweb

networks:
  doorsweb:
    driver: bridge

volumes:
  # Defaults used when BACKUP_PATH / USER_PHOTO_PATH are not set in .env.
  backups:
    driver: local
  user-photo:
    driver: local
  settings:
    driver: local
  mssql-data:
    driver: local
