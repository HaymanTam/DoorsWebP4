services:
  doorsweb.client:
    image: ${DOCKER_REGISTRY-}doorswebclient
    build:
      context: .
      dockerfile: DoorsWeb.Client/Dockerfile
    container_name: doorsweb.client
    # Static-file/Blazor host; keeps a small footprint.
    mem_limit: 512m
    ports:
      - "60880:443"
    depends_on:
      - doorsweb.api
    networks:
      - doorsweb

  doorsweb.api:
    image: ${DOCKER_REGISTRY-}doorswebapi
    build:
      context: .
      dockerfile: DoorsWeb.API/Dockerfile
    container_name: doorsweb.api
    # .NET API; 1 GB is plenty for dev workloads (raise if large legacy restores OOM).
    mem_limit: 1g
    ports:
      - "60878:8080"
      - "60879:8081"
      # UDP protocol listener (UdpProtocol:ListenPort). Controllers reach the
      # API on this port; outbound packets to controllers use 10012 and NAT out.
      - "10013:10013/udp"
    environment:
      # Container-internal storage paths (constant). The host side is chosen below.
      - Backup__Directory=/data/backups
      - Storage__UserPhotoDirectory=/data/user-photo
      - Storage__SettingsDirectory=/data/settings
    volumes:
      # Hybrid storage: a Docker-managed named volume is used by default.
      # Set BACKUP_PATH / USER_PHOTO_PATH in .env to a host folder to bind-mount
      # a real directory instead (e.g. /srv/doorsweb/backups or D:/DoorsData).
      - ${BACKUP_PATH:-backups}:/data/backups
      - ${USER_PHOTO_PATH:-user-photo}:/data/user-photo
      - ${SETTINGS_PATH:-settings}:/data/settings
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doorsweb

  postgres:
    image: postgres:16
    container_name: doorsweb.postgres
    # PostgreSQL keeps shared_buffers modest by default and leans on the OS page cache,
    # so it doesn't hoard RAM the way SQL Server's buffer pool did; 1 GB is ample for dev.
    mem_limit: 1g
    environment:
      - POSTGRES_DB=DoorsWeb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      # Host port is overridable via POSTGRES_HOST_PORT in .env (defaults to 5432).
      # The container port stays 5432, so in-network clients still use doorsweb.postgres:5432.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d DoorsWeb"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - doorsweb

networks:
  doorsweb:
    driver: bridge

volumes:
  # Defaults used when BACKUP_PATH / USER_PHOTO_PATH are not set in .env.
  backups:
    driver: local
  user-photo:
    driver: local
  settings:
    driver: local
  postgres-data:
    driver: local
