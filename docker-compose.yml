services:
  doorsweb.client:
    image: ${DOCKER_REGISTRY-}doorswebclient
    build:
      context: .
      dockerfile: DoorsWeb.Client/Dockerfile
    container_name: doorsweb.client
    ports:
      - "60880:443"
    volumes:
      - user-photo:/media/user-photo
    depends_on: 
      - doorsweb.api
    networks:
      - doorsweb

  doorsweb.api:
    image: ${DOCKER_REGISTRY-}doorswebapi
    build:
      context: .
      dockerfile: DoorsWeb.API/Dockerfile
    container_name: doorsweb.api
    ports:
      - "60878:8080"
      - "60879:8081"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - doorsweb

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: doorsweb.mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - doorsweb

networks:
  doorsweb:
    driver: bridge

volumes:
  user-photo:
    driver: local
  mssql-data:
    driver: local